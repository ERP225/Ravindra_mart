<!DOCTYPE html>
<html>
<head>

<title>Live Rider Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

#map{
height:600px;
}

</style>

</head>

<body>

<h2>🚴 Live Rider Tracking</h2>

<div id="map"></div>

<script>

var map = L.map('map').setView([17.3850,78.4867],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

var markers = {}

function loadRiders(){

fetch("/get_rider_locations")
.then(res=>res.json())
.then(data=>{

data.forEach(rider=>{

if(markers[rider.rider_id]){

markers[rider.rider_id].setLatLng([rider.latitude,rider.longitude])

}else{

markers[rider.rider_id]=L.marker([rider.latitude,rider.longitude])
.addTo(map)
.bindPopup("Rider ID: "+rider.rider_id)

}

})

})

}

setInterval(loadRiders,5000)

</script>

</body>
</html>
