<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ravi Mart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

.container{
  display:flex;
}

/* SIDEBAR */

.sidebar{
  width:250px;
  background:#111827;
  color:white;
  min-height:100vh;
  padding:20px;
}

.menu button{
  width:100%;
  padding:12px;
  border:none;
  background:transparent;
  color:white;
  text-align:left;
  margin-bottom:8px;
  cursor:pointer;
}

.menu button:hover{
  background:#f59e0b;
}

/* CONTENT */

.content{
  flex:1;
  padding:30px;
}
</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Ravi Mart</h3>

<div class="menu">

<button onclick="location.href='/user_dashboard'">
<i class="fa fa-home"></i> Home
</button>

<button onclick="location.href='/cart'">
<i class="fa fa-shopping-cart"></i> Cart
</button>

<button onclick="location.href='/my_orders'">
<i class="fa fa-box"></i> Orders
</button>

<button onclick="location.href='/profile'">
<i class="fa fa-user"></i> Profile
</button>

<button onclick="location.href='/logout'">
<i class="fa fa-sign-out"></i> Logout
</button>

</div>

</div>

<!-- PAGE CONTENT -->

<div class="content">

{% block content %}

{% endblock %}

</div>

</div>

</body>
</html>
