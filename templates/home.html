<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravi Mart</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #f8f9fa, #e9ecef);
    margin: 0;
}

/* Navbar */
.navbar {
    background: #212529;
}

.navbar-brand {
    font-size: 24px;
    font-weight: 600;
}

/* Hero Section */
.hero {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}

/* Box */
.hero-box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 500px;
    width: 100%;
}

/* Heading */
.hero h1 {
    font-size: 42px;
    font-weight: 600;
    color: #343a40;
}

.hero p {
    font-size: 16px;
    color: #6c757d;
}

/* Buttons */
.btn-custom {
    margin: 10px;
    width: 100%;
    max-width: 250px;
    border-radius: 30px;
    font-weight: 500;
    transition: 0.3s;
}

/* Hover */
.btn-primary:hover {
    transform: translateY(-3px);
}

.btn-success:hover {
    transform: translateY(-3px);
}

.btn-warning:hover {
    transform: translateY(-3px);
}

/* Footer */
footer {
    background: #212529;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand">🛒 Ravi Mart</span>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <div class="hero-box">
        <h1>Welcome to Ravi Mart 🛍️</h1>
        <p>Your one-stop shop for quality products</p>

       <div class="mt-4 d-flex flex-column align-items-center">

    <a href="/user_login" class="btn btn-primary btn-lg btn-custom">
        User Login
    </a>

    <a href="/register" class="btn btn-success btn-lg btn-custom">
        User Register
    </a>

    <a href="/rider_login" class="btn btn-info btn-lg btn-custom">
        Rider Login
    </a>

    <a href="/rider_register" class="btn btn-secondary btn-lg btn-custom">
        Rider Register
    </a>

    <a href="/admin_login" class="btn btn-warning btn-lg btn-custom">
        Admin Login
    </a>

</div>
    </div>
</div>

<!-- FOOTER -->
<footer>
    © 2026 Ravi Mart | All Rights Reserved
</footer>

</body>
</html>
