<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravi Mart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #f0ede6;
  }

  .nav {
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo {
    width: 200px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-logo img { width: 200px; height: 150px; object-fit: contain; }
  .brand-name { font-size: 16px; font-weight: 600; color: #f0ede6; letter-spacing: -0.01em; }

  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-pill {
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    padding: 5px 12px; border-radius: 99px;
    border: 1px solid rgba(245,158,11,0.3);
    color: #f59e0b;
  }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,0.2); }

  /* HERO */
  .hero {
    padding: 5rem 2rem 3rem;
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 420px; gap: 4rem; align-items: center;
  }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #f59e0b;
    margin-bottom: 1.5rem;
  }

  .hero-eyebrow-dot { width: 4px; height: 4px; border-radius: 50%; background: #f59e0b; }

  .hero-h1 {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.08;
    color: #f0ede6;
    margin-bottom: 1.25rem;
  }

  .hero-h1 em { font-style: normal; color: #f59e0b; }

  .hero-p {
    font-size: 15px;
    font-weight: 300;
    line-height: 1.75;
    color: rgba(240,237,230,0.5);
    max-width: 400px;
    margin-bottom: 2.5rem;
  }

  .stats-row {
    display: flex;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    overflow: hidden;
    width: fit-content;
  }

  .stat { padding: 16px 24px; text-align: center; }
  .stat + .stat { border-left: 1px solid rgba(255,255,255,0.08); }

  .stat-n { font-size: 22px; font-weight: 700; color: #f0ede6; }
  .stat-l { font-size: 10px; color: rgba(240,237,230,0.35); text-transform: uppercase; }

  /* PANEL */
  .panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .panel-head {
    font-size: 10px;
    text-transform: uppercase;
    color: rgba(240,237,230,0.3);
    margin-bottom: 4px;
  }

  .entry-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.02);
    text-decoration: none;
  }

  .btn-icon { width: 38px; height: 38px; border-radius: 10px; display:flex; align-items:center; justify-content:center; }
  .btn-icon svg { width: 16px; height: 16px; stroke-width: 1.8; }

  .ic-blue { background: rgba(59,130,246,0.12); }
  .ic-green { background: rgba(34,197,94,0.12); }
  .ic-amber { background: rgba(245,158,11,0.12); }
  .ic-pink { background: rgba(236,72,153,0.12); }
  .ic-red { background: rgba(239,68,68,0.12); }

  .btn-title { font-size: 13px; color: rgba(240,237,230,0.9); }
  .btn-sub { font-size: 11px; color: rgba(240,237,230,0.35); }

  .btn-arrow { color: rgba(240,237,230,0.2); }

  /* FEATURES */
  .features {
    max-width: 1100px;
    margin: 3rem auto;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 16px;
  }

  .feat {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 1.5rem;
  }

  .feat-title { font-size: 14px; font-weight: 600; }
  .feat-desc { font-size: 12px; color: rgba(240,237,230,0.4); }

  /* FOOTER */
  .footer-wrap { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

  .footer {
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 1.25rem 0;
    display: flex;
    justify-content: space-between;
  }

  .footer-copy { font-size: 11px; color: rgba(240,237,230,0.2); }

</style>
</head>

<body>

<nav class="nav">
  <div class="brand">
    <div class="brand-logo">
      <img src="/static/images/ravi_mart_logo.png" alt="Ravi Mart">
    </div>
  </div>

  <div class="nav-right">
    <div class="nav-dot"></div>
    <div class="nav-pill">Est. 2026</div>
  </div>
</nav>

<div class="hero">
  <div>
    <div class="hero-eyebrow">
      <span class="hero-eyebrow-dot"></span>Your local marketplace
    </div>
    <h1 class="hero-h1">Shop smarter,<br>live <em>better.</em></h1>
    <p class="hero-p">Quality products, lightning-fast delivery, and a seamless experience.</p>

    <div class="stats-row">
      <div class="stat"><div class="stat-n">500+</div><div class="stat-l">Products</div></div>
      <div class="stat"><div class="stat-n">15 Min</div><div class="stat-l">Delivery</div></div>
      <div class="stat"><div class="stat-n">24/7</div><div class="stat-l">Support</div></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">Sign in to continue</div>

    <a href="/user_login" class="entry-btn">
      <div class="btn-icon ic-blue"></div>
      <div>
        <div class="btn-title">User login</div>
        <div class="btn-sub">Browse and order products</div>
      </div>
      <div class="btn-arrow">›</div>
    </a>

    <a href="/register" class="entry-btn">
      <div class="btn-icon ic-green"></div>
      <div>
        <div class="btn-title">Create account</div>
        <div class="btn-sub">Register as user</div>
      </div>
      <div class="btn-arrow">›</div>
    </a>

  </div>
</div>

<div class="features"></div>

<div class="footer-wrap">
  <div class="footer">
    <span class="footer-copy">© 2026 Ravi Mart</span>
  </div>
</div>

</body>
</html>
