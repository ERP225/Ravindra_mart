<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background: #f5f7fb; 
        }
        button { 
            padding: 12px 25px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer; 
        }
        button:hover {
            background: #2ecc71;
        }
        .container {
            background: #fff;
            display: inline-block;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
   

    <!-- Pay Now button -->
  <h2>💳 Payment Page</h2>

<p>Order Number: {{ order_number }}</p>

<a href="/payment_success/{{ order_number }}">
    <button>Pay Now</button>
</a>

</div>

<script>
const payButton = document.querySelector("button");
payButton.addEventListener("click", function(){
    alert("Payment Successful ✅");
});
</script>

</body>
</html>
