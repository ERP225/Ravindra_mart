<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Order Successful</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* Success Card */

.success-card{
background:white;
padding:50px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
width:420px;
animation:fadeIn 0.8s ease;
}

/* Check Animation */

.checkmark{
font-size:80px;
color:#22c55e;
animation:pop 0.6s ease;
margin-bottom:15px;
}

@keyframes pop{
0%{transform:scale(0);}
80%{transform:scale(1.2);}
100%{transform:scale(1);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

h1{
color:#22c55e;
margin-bottom:10px;
}

.order-number{
background:#f3f4f6;
padding:10px;
border-radius:6px;
margin:15px 0;
font-weight:bold;
}

/* Buttons */

.buttons{
margin-top:25px;
display:flex;
gap:10px;
justify-content:center;
}

.btn{
padding:10px 18px;
border-radius:6px;
border:none;
cursor:pointer;
font-weight:500;
text-decoration:none;
}

.btn-primary{
background:#f59e0b;
color:white;
}

.btn-dark{
background:#111827;
color:white;
}

.btn:hover{
opacity:0.9;
}

/* Order Items */

.order-items{
margin-top:20px;
text-align:left;
}

.item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="success-card">

<div class="checkmark">
<i class="fa fa-check-circle"></i>
</div>

<h1>Order Successful!</h1>

<p>Your order has been placed successfully.</p>

<div class="order-number">
Order No: {{ order_number }}
</div>

<div class="order-items">

{% for item in order %}

<div class="item">
<span>{{ item.name }}</span>
<span>₹{{ item.price }}</span>
</div>

{% endfor %}

</div>

<div class="buttons">

<a href="/my_orders" class="btn btn-dark">
<i class="fa fa-box"></i> Track Order
</a>

<a href="/user_dashboard" class="btn btn-primary">
<i class="fa fa-shopping-bag"></i> Continue Shopping
</a>

</div>

</div>

</body>
</html>
