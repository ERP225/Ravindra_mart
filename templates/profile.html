<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravi Mart - Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f3f4f6;
  display:flex;
  justify-content:center;
  padding:50px 20px;
}

/* Container */
.profile-container {
  background:white;
  width:100%;
  max-width:500px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  padding:40px 30px;
}

/* Title */
.profile-container h2 {
  text-align:center;
  color:#111827;
  margin-bottom:30px;
}

/* Profile Picture */
.profile-pic-wrapper {
  position: relative;
  width:140px;
  height:140px;
  margin:0 auto 25px auto;
}

.profile-pic-wrapper img {
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #f59e0b;
  transition:0.3s;
}

.profile-pic-wrapper:hover img {
  opacity:0.8;
}

/* Camera Button */
.camera-btn {
  position: absolute;
  bottom:0;
  right:0;
  background:#f59e0b;
  border:none;
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
  transition:0.3s;
}

.camera-btn:hover {
  background:#d97706;
  transform:scale(1.1);
}

/* Form */
form {
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* Input fields */
input[type="text"], input[type="email"], input[type="tel"] {
  width:100%;
  padding:12px 15px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:16px;
  transition:0.3s;
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="tel"]:focus {
  border-color:#f59e0b;
  box-shadow:0 0 8px rgba(245,158,11,0.3);
  outline:none;
}

/* Submit Button */
button.submit-btn {
  padding:14px;
  border:none;
  border-radius:8px;
  background:#f59e0b;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button.submit-btn:hover {
  background:#d97706;
  transform:translateY(-2px);
}

/* Hide default file input */
input[type="file"] {
  display:none;
}
</style>
</head>
<body>

<div class="profile-container">

  <h2>My Profile</h2>

  <!-- Profile Picture -->
  <div class="profile-pic-wrapper">
    <img src="{{ url_for('static', filename=user['profile_pic'] or 'default.jpg') }}">
    <button class="camera-btn" onclick="document.getElementById('fileInput').click();">
      <i class="fa fa-camera"></i>
    </button>
  </div>

  <!-- Profile Form -->
  <form method="POST" action="/update_profile" enctype="multipart/form-data">
    <input type="file" id="fileInput" name="profile_pic" accept="image/*" onchange="previewImage(event)">

    <input type="text" name="username" value="{{ user['username'] or '' }}">
<input type="email" name="email" value="{{ user['email'] or '' }}">
<input type="tel" name="phoneno" value="{{ user['phoneno'] or '' }}">

    <button type="submit" class="submit-btn">Update Profile</button>
  </form>
</div>

<script>
function previewImage(event) {
  const reader = new FileReader();
  reader.onload = function(){
    const output = document.getElementById('profilePic');
    output.src = reader.result;
  }
  reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
