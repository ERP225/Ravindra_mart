{% extends "dashboard_panel.html" %}

{% block content %}

<style>

.profile-wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.profile-container{
background:white;
width:100%;
max-width:500px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
padding:35px;
}

.profile-title{
text-align:center;
font-size:26px;
font-weight:600;
margin-bottom:25px;
color:#111827;
}

/* Profile Image */

.profile-pic-wrapper{
position:relative;
width:140px;
height:140px;
margin:auto;
margin-bottom:25px;
}

.profile-pic-wrapper img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:5px solid #f59e0b;
transition:.3s;
}

.profile-pic-wrapper:hover img{
opacity:.8;
}

/* Camera Button */

.camera-btn{
position:absolute;
bottom:0;
right:0;
background:#f59e0b;
border:none;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:.3s;
}

.camera-btn:hover{
background:#d97706;
transform:scale(1.1);
}

/* Form */

.profile-form{
display:flex;
flex-direction:column;
gap:18px;
}

/* Inputs */

.profile-form input{
width:100%;
padding:12px 14px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:15px;
transition:.3s;
}

.profile-form input:focus{
border-color:#f59e0b;
box-shadow:0 0 8px rgba(245,158,11,0.3);
outline:none;
}

/* Button */

.update-btn{
background:#f59e0b;
border:none;
padding:14px;
border-radius:8px;
font-size:16px;
font-weight:600;
color:white;
cursor:pointer;
transition:.3s;
}

.update-btn:hover{
background:#d97706;
transform:translateY(-2px);
}

input[type="file"]{
display:none;
}

</style>

<div class="profile-wrapper">

<div class="profile-container">

<div class="profile-title">
<i class="fa fa-user"></i> My Profile
</div>

<!-- Profile Picture -->

<div class="profile-pic-wrapper">

<img id="profilePic"
src="{{ url_for('static', filename=user['profile_pic'] or 'default.jpg') }}">

<button type="button" class="camera-btn"
onclick="document.getElementById('fileInput').click();">

<i class="fa fa-camera"></i>

</button>

</div>

<form method="POST" action="/update_profile"
enctype="multipart/form-data"
class="profile-form">

<input type="file"
id="fileInput"
name="profile_pic"
accept="image/*"
onchange="previewImage(event)">

<input type="text"
name="username"
placeholder="Username"
value="{{ user['username'] }}">

<input type="email"
name="email"
placeholder="Email"
value="{{ user['email'] }}">

<input type="tel"
name="phoneno"
placeholder="Phone Number"
value="{{ user['phoneno'] }}">

<button type="submit" class="update-btn">
<i class="fa fa-save"></i> Update Profile
</button>

</form>

</div>

</div>

<script>

function previewImage(event){

const reader = new FileReader();

reader.onload = function(){

document.getElementById("profilePic").src = reader.result;

}

reader.readAsDataURL(event.target.files[0]);

}

</script>

{% endblock %}
