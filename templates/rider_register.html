<!DOCTYPE html>
<html>
<head>

<title>Rider Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:400px;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="card">

<h3 class="text-center mb-4">🚴 Rider Register</h3>

<form method="POST">

<input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>

<input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number" required>

<input type="text" name="vehicle" class="form-control mb-3" placeholder="Bike Number" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-success w-100">Register</button>

</form>

</div>

</body>
</html>
