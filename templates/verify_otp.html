<!DOCTYPE html>
<html>
<head>
<title>Verify OTP - Ravi Mart</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
margin-bottom:15px;
font-size:16px;
text-align:center;
letter-spacing:5px;
}

button{
width:100%;
padding:10px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#219150;
}

.resend{
margin-top:10px;
display:block;
text-decoration:none;
color:#3498db;
font-size:14px;
}

.error{
color:red;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Enter OTP</h2>
<form method="POST">
    <input type="text" name="otp" placeholder="Enter OTP" required><br><br>
    <button type="submit">Verify OTP</button>
</form>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, msg in messages %}
    <div class="alert alert-{{ category }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

</div>

</body>
</html>
